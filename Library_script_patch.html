  // ── Render all book cards ──
  function renderBooks(category, containerId) {
    const container = document.getElementById(containerId);
    if (!container || !books[category]) return;
    container.innerHTML = books[category].map(book => `
      <div class="book-card">
        <div class="book-cover">
          <img src="./assets/images/book-1.png" alt="${book.title}" style="width:100%;height:100%;object-fit:cover;">
        </div>
        <div class="book-info">
          <div class="book-title">${book.title}</div>
          <div class="book-genre">${book.genre}</div>
          <button class="read-btn" onclick="window.openReader('${book.id}')">Read Now</button>
        </div>
      </div>
    `).join('');
  }

  // ── Reader state ──
  let currentBook      = null;
  let currentBookId    = null;
  let currentPageIndex = 0;

  // ── Open reader: load saved progress from Firebase/localStorage ──
  window.openReader = async function(bookId) {
    currentBook      = bookDatabase[bookId];
    currentBookId    = bookId;
    if (!currentBook) return;

    // Restore saved page (async — Firebase or local)
    currentPageIndex = await getProgress(bookId);
    // Clamp in case pages changed
    if (currentPageIndex >= currentBook.pages.length) currentPageIndex = 0;

    document.getElementById('readerTitle').textContent    = currentBook.title;
    document.getElementById('totalPageNum').textContent   = currentBook.pages.length;

    renderPages();
    updatePageDisplay();
    document.getElementById('readerModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  };

  window.closeReader = function() {
    document.getElementById('readerModal').classList.remove('active');
    document.body.style.overflow = 'auto';
    currentBook      = null;
    currentBookId    = null;
    currentPageIndex = 0;
  };

  function renderPages() {
    const container = document.getElementById('pagesContainer');
    container.innerHTML = '';
    currentBook.pages.forEach((pageContent, index) => {
      const pageDiv = document.createElement('div');
      pageDiv.className = 'page';
      if (index === currentPageIndex) pageDiv.classList.add('active');
      pageDiv.innerHTML = pageContent;
      container.appendChild(pageDiv);
    });
  }

  function updatePageDisplay() {
    const pages = document.querySelectorAll('.page');
    pages.forEach((page, index) => {
      page.classList.remove('active', 'exit-left', 'exit-right');
      if (index === currentPageIndex) page.classList.add('active');
    });
    document.getElementById('currentPageNum').textContent = currentPageIndex + 1;
    updateProgressBar();
    updateButtons();
  }

  function updateProgressBar() {
    const progress = ((currentPageIndex + 1) / currentBook.pages.length) * 100;
    document.getElementById('progressFill').style.width = progress + '%';
  }

  function updateButtons() {
    document.getElementById('prevBtn').disabled = currentPageIndex === 0;
    document.getElementById('nextBtn').disabled = currentPageIndex === currentBook.pages.length - 1;
  }

  window.nextPage = function() {
    if (currentPageIndex < currentBook.pages.length - 1) {
      document.querySelectorAll('.page')[currentPageIndex].classList.add('exit-left');
      currentPageIndex++;
      updatePageDisplay();
      saveProgress(currentBookId, currentPageIndex); // 🔥 auto-save to Firebase/local
    }
  };

  window.previousPage = function() {
    if (currentPageIndex > 0) {
      document.querySelectorAll('.page')[currentPageIndex].classList.add('exit-right');
      currentPageIndex--;
      updatePageDisplay();
      saveProgress(currentBookId, currentPageIndex); // 🔥 auto-save to Firebase/local
    }
  };

  // ── Keyboard navigation (unchanged) ──
  document.addEventListener('keydown', function(event) {
    if (document.getElementById('readerModal').classList.contains('active')) {
      if (event.key === 'ArrowRight') window.nextPage();
      if (event.key === 'ArrowLeft')  window.previousPage();
      if (event.key === 'Escape')     window.closeReader();
    }
  });

  // ── Render all sections ──
  ['kidsAdventure','kidsFairy','kidsBedtime','kidsAnimal','kidsMoral','kidsMystery',
   'teensRomance','teensFantasy','teensSchool','teensDarkRomance','teensAdventure','teensMystery',
   'adultsThrill','adultsCrime','adultsRomance','adultsScienceFiction','adultsHorror','adultsLiterary'
